<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paralica</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0e17;
      color: #e0e6f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }
    .avatar {
      width: 180px;
      height: 220px;
      border-radius: 100px;
      object-fit: cover;
      object-position: center top;
      margin-bottom: 1.5rem;
      border: 3px solid rgba(96,165,250,0.3);
      box-shadow: 0 0 40px rgba(96,165,250,0.15);
    }
    h1 {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.75rem;
    }
    .tagline {
      color: #64748b;
      font-size: 1.2rem;
    }
    .footer {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: #1e293b;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/lica.jpg" alt="Lica" class="avatar">
    <p class="tagline">by curiosity</p>
    <div class="footer">paralica.ai</div>
  </div>
</body>
</html>
